name: Scrape Table Sums

on:
  workflow_dispatch:   # lets you trigger it manually with a button
  push:
    branches: [main]  # also runs when you push code

jobs:
  scrape:
    runs-on: ubuntu-latest  # GitHub gives us a fresh Linux computer

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright and its browser
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium
          npx playwright install-deps chromium

      - name: Run scraper - 23f3004075@ds.study.iitm.ac.in
        run: node scrape.js
```

> 🔑 **Important:** Notice the last step's `name` contains your email address. This is required so the grader can find it in the logs!

Click **Commit new file**.

